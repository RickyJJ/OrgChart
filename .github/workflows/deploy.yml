name: CD-Deploy-to-Aliyun-SWAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        env:
          VITE_DIRECTUS_URL: http://${{ secrets.SERVER_IP }}:8055
        run: |
          npm install
          npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 强化 PATH 环境变量，确保服务器能认出 node/git/pm2
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin

            # 1. 确保项目根目录存在
            mkdir -p /www/wwwroot/orgChart
            cd /www/wwwroot/orgChart
            
            # 2. 如果尚未克隆 Git，则执行初次拉取
            if [ ! -d ".git" ]; then
              # 先把目录清空
              rm -rf * 
              # 您需要确认您的仓库地址（如果是私有库可能需要设置凭据，但通过 Actions 推送通常没问题）
              git clone https://github.com/${{ github.repository }}.git .
            fi

            # 3. 强制同步最新代码
            git fetch --all
            git reset --hard origin/main

            # 4. 分别安装前后端生产依赖
            npm install --production
            cd backend && npm install --production
            cd ..

            # 5. 在服务器完成最终构建（注入线上 API 地址）
            export VITE_DIRECTUS_URL=http://${{ secrets.SERVER_IP }}:8055
            npm run build

            # 6. 利用 PM2 启动/重启后端服务
            # 首次启动使用 start，后续使用 reload 确保零秒停机
            pm2 start ecosystem.config.cjs --env production || pm2 reload ecosystem.config.cjs
            pm2 save
