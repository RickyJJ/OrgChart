name: CD-Deploy-to-Aliyun-SWAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        env:
          VITE_DIRECTUS_URL: http://${{ secrets.SERVER_IP }}:8055
        run: |
          npm install
          npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin
            cd /www/wwwroot/orgChart
            # 1. 同步源代码
            git fetch --all
            git reset --hard origin/main
            
            # 2. 强制清理老的构建产物，确保“推倒重来”
            rm -rf dist/
            
            # 3. 安装依赖（确保所有构建工具都在）
            npm install
            
            # 4. 构建前环境变量注入并执行构建
            export VITE_DIRECTUS_URL=http://${{ secrets.SERVER_IP }}:8055
            echo "Starting Vite Build..."
            npx vite build
            
            # 5. 【关键调试】：检查 dist 目录是否生成以及最新文件的戳记
            if [ -d "dist" ]; then
              echo "Build successful. Latest index.html state:"
              ls -l dist/index.html
            else
              echo "ERROR: dist directory was not created!"
              exit 1
            fi
            # 6. 后端依赖与 PM2 重启
            cd backend && npm install --production
            cd ..
            pm2 start ecosystem.config.cjs --env production || pm2 reload ecosystem.config.cjs
            pm2 save
