name: CD-Deploy-to-Aliyun-SWAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        env:
          VITE_DIRECTUS_URL: http://${{ secrets.SERVER_IP }}:8055
        run: |
          npm install
          npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin
            mkdir -p /www/wwwroot/orgChart
            cd /www/wwwroot/orgChart
            
            echo "Current Directory: $(pwd)"
            
            if [ ! -d ".git" ]; then
              echo "Re-cloning repository..."
              rm -rf * 
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            echo "Fetching latest code..."
            git fetch --all
            git reset --hard origin/main
            
            echo "Installing dependencies..."
            npm install --no-audit
            
            # 手动清理上一次的缓存，确保 dist 是因为这次构建产生的
            rm -rf dist/
            
            echo "Building frontend..."
            export VITE_DIRECTUS_URL=http://${{ secrets.SERVER_IP }}:8055
            echo "VITE_DIRECTUS_URL is $VITE_DIRECTUS_URL"
            
            # 使用 npm run build 并捕获日志，如果失败则立即退出整个脚本
            npm run build || { echo "Build FAILED!"; exit 1; }
            
            echo "Post-build check..."
            if [ -d "dist" ] && [ -f "dist/index.html" ]; then
              echo "SUCCESS: Build artifacts found in dist/."
              ls -lh dist/
            else
              echo "CRITICAL ERROR: Build finished but dist/index.html not found!"
              exit 1
            fi
            
            echo "Updating backend..."
            cd backend && npm install --production
            cd ..
            pm2 start ecosystem.config.cjs --env production || pm2 reload ecosystem.config.cjs
            pm2 save
