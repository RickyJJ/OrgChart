name: CD-Deploy-to-Aliyun-SWAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        env:
          VITE_DIRECTUS_URL: http://${{ secrets.SERVER_IP }}:8055
        run: |
          npm install
          npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin
            mkdir -p /www/wwwroot/orgChart
            cd /www/wwwroot/orgChart
            
            if [ ! -d ".git" ]; then
              rm -rf * 
              git clone https://github.com/${{ github.repository }}.git .
            fi
            git fetch --all
            git reset --hard origin/main
            # 【修复点 1】：必须安装全部依赖（包括 Vite 构建工具）
            npm install
            
            # 安装后端依赖 (后端只需要生产环境依赖)
            cd backend && npm install --production
            cd ..
            # 【修复点 2】：注入线上环境地址并正式构建
            export VITE_DIRECTUS_URL=http://${{ secrets.SERVER_IP }}:8055
            # 使用 npx 锁定本地路径下的 vite 运行
            npx vite build
            # 6. PM2 重启
            pm2 start ecosystem.config.cjs --env production || pm2 reload ecosystem.config.cjs
            pm2 save
